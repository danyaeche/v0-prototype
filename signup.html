<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chorus · Sign up</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <aside class="auth-aside">
      <a class="auth-wordmark" href="overview.html">chorus</a>
      <div class="auth-hero"><img src="logo.png" alt="Chorus" /></div>
      <h1>Create your<br/>account</h1>
      <p>Get started<br/>with Chorus.</p>
    </aside>
    <main class="auth-main">
      <div class="stack">
        <div class="field"><label>Full name</label><input class="input" value="Mathieu Kury" /></div>
        <div class="field"><label>Work email</label><input class="input" type="email" value="mkury@also.com" /></div>
        <div class="field"><label>Company</label><input class="input" value="ALSO" /></div>
        <div class="field">
          <label>Password</label>
          <div class="input-group">
            <input type="password" value="superSecret123" />
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" stroke="#9aa1a8" stroke-width="1.6"/><circle cx="12" cy="12" r="2.6" stroke="#9aa1a8" stroke-width="1.6"/></svg>
          </div>
        </div>
        <a class="btn btn--primary btn--lg btn--block" href="overview.html">Create account</a>
      </div>
      <div class="auth-foot">Already have an account? <a href="login.html">Log in</a></div>
    </main>
  </div>
</div>
<script src="switcher.js"></script>
</body>
</html>
