<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chorus · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <aside class="auth-aside">
      <a class="brand brand--light" href="overview.html">
        <img src="logo.png" class="mark" alt="Chorus" />
        chorus
      </a>
      <div class="auth-hero"><div id="authHero"></div></div>
      <h1>Welcome<br/>back</h1>
      <p>Log in to access<br/>your workspace.</p>
    </aside>
    <main class="auth-main">
      <div class="stack">
        <div class="field">
          <label>Email</label>
          <input class="input" type="email" value="mkury@also.com" />
        </div>
        <div class="field">
          <div class="row-between"><label>Password</label><a class="link-muted" href="#">Forgot password?</a></div>
          <input class="input" type="password" value="superSecret123" />
        </div>
        <label class="checkbox"><input type="checkbox" /> Remember me</label>
        <a class="btn btn--primary btn--lg btn--block" href="overview.html">Log in</a>
        <div class="divider">or</div>
        <a class="btn btn--lg btn--block" href="overview.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="10" rx="2" stroke="#3f4a47" stroke-width="1.7"/><path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="#3f4a47" stroke-width="1.7"/></svg>
          Log in with SSO
        </a>
      </div>
      <div class="auth-foot">Don't have an account? <a href="signup.html">Sign up</a></div>
    </main>
  </div>
</div>
<script src="switcher.js"></script>
<script type="importmap">
{ "imports": { "three": "./vendor/three/build/three.module.js", "three/addons/": "./vendor/three/addons/" } }
</script>
<script type="module" src="auth-globe-signup.js"></script>
</body>
</html>
